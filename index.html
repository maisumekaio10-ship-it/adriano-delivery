<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOGUEIRA RESTAURANTE DA ROÇA</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"><style>
:root{
--primary:#f4d03f;
--primary-dark:#d4ac0d;
--secondary:#2ecc71;
--black:#000;
--white:#fff;
--background:#000;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--background);
color:var(--white);
background-image:url('https://www.transparenttextures.com/patterns/food.png');
}

.container{padding:20px 16px 100px;max-width:600px;margin:0 auto;}

header{
position:sticky;top:0;z-index:1000;
background:linear-gradient(135deg,var(--primary),var(--secondary));
padding:10px 12px;
}

.header-content{
display:flex;
align-items:center;
gap:10px;
}

.logo-box{
width:60px;
height:60px;
border-radius:12px;
overflow:hidden;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
}

.logo-box img{
width:100%;
height:100%;
object-fit:cover;
}

.header-texts{
display:flex;
flex-direction:column;
}

.header-title{font-size:16px;font-weight:700;line-height:1.2;}
.header-sub{font-size:12px;}

.card{background:#111;padding:16px;margin-bottom:14px;border-radius:16px;}
.flex{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.circle{width:60px;height:60px;border-radius:12px;overflow:hidden;}
.circle img{width:100%;height:100%;object-fit:cover;}

button{border:none;border-radius:12px;font-family:'Poppins';font-weight:600;cursor:pointer;}
.primary{background:var(--primary);color:#000;height:44px;width:100%;}
.small{width:auto;height:36px;padding:0 14px;}

input,select{width:100%;padding:12px;margin:8px 0 14px;border-radius:12px;border:none;}
.hidden{display:none;}

#cartBtn{position:fixed;bottom:24px;right:20px;width:64px;height:64px;border-radius:50%;background:var(--secondary);display:flex;justify-content:center;align-items:center;font-size:22px;}
#cartCount{position:absolute;top:-6px;right:-6px;background:red;color:white;width:24px;height:24px;border-radius:50%;display:flex;justify-content:center;align-items:center;font-size:12px;}

.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--secondary);color:black;padding:12px 22px;border-radius:30px;display:none;}

.aviso{background:#222;padding:10px;border-radius:10px;margin-bottom:15px;font-size:12px;border-left:4px solid var(--primary);}
</style></head><body><header>
<div class="header-content">
<div class="logo-box">
<img src="logo.png">
</div>
<div class="header-texts">
<div class="header-title">NOGUEIRA RESTAURANTE DA ROÇA</div>
<div class="header-sub">Comida caseira • Marmitas • Sabor da roça</div>
</div>
</div>
</header><div class="container" id="app"></div><div id="cartBtn" onclick="goCart()">🛒<div id="cartCount">0</div></div>
<div class="toast" id="toast">Item adicionado</div><script>
const TAXA=7;
let cart=[];
let viewStack=[];
let dadosPedido={};

function avisoPix(){
return `<div class="aviso">Pedidos realizados com pagamento via <b>Pix</b> devem ter o comprovante enviado para confirmação.</div>`;
}

function navigate(fn){viewStack.push(fn);history.pushState({},"");fn();}

window.addEventListener("popstate",function(){
if(viewStack.length>1){viewStack.pop();let last=viewStack[viewStack.length-1];last();}
});

const produtos={
Marmitas:[
{name:"Marmita Frango",price:15,descricao:"Frango grelhado",img:"frango.jpg"},
{name:"Marmita Carne",price:17,descricao:"Carne assada",img:"carne.jpg"},
{name:"Marmita Linguiça",price:16,descricao:"Linguiça acebolada",img:"linguica.jpg"},
{name:"Marmita Feijoada",price:18,descricao:"Feijoada completa",img:"feijoada.jpg"},
{name:"Marmita Costela",price:20,descricao:"Costela",img:"costela.jpg"},
{name:"Marmita Peixe",price:18,descricao:"Peixe",img:"peixe.jpg"},
{name:"Marmita Vegetariana",price:14,descricao:"Legumes",img:"vegetariana.jpg"},
{name:"Marmita Completa",price:22,descricao:"Completa",img:"completa.jpg"}
],
Bebidas:[
{name:"Coca-Cola",price:6,descricao:"Lata",img:"coca.jpg"},
{name:"Guaraná",price:5,descricao:"Lata",img:"guarana.jpg"},
{name:"Suco Natural",price:7,descricao:"Copo",img:"suco.jpg"},
{name:"Água",price:3,descricao:"500ml",img:"agua.jpg"},
{name:"Refrigerante 2L",price:10,descricao:"2L",img:"refri2l.jpg"},
{name:"Chá Gelado",price:6,descricao:"Chá",img:"cha.jpg"},
{name:"Energético",price:12,descricao:"Lata",img:"energetico.jpg"},
{name:"Suco Detox",price:9,descricao:"Detox",img:"detox.jpg"}
],
Acompanhamentos:[
{name:"Arroz",price:5,descricao:"Extra",img:"arroz.jpg"},
{name:"Feijão",price:5,descricao:"Caseiro",img:"feijao.jpg"},
{name:"Batata Frita",price:8,descricao:"Frita",img:"batata.jpg"},
{name:"Farofa",price:4,descricao:"Tempero",img:"farofa.jpg"},
{name:"Salada",price:6,descricao:"Fresca",img:"salada.jpg"},
{name:"Ovo",price:3,descricao:"Frito",img:"ovo.jpg"},
{name:"Macarrão",price:7,descricao:"Alho e óleo",img:"macarrao.jpg"},
{name:"Torresmo",price:10,descricao:"Crocante",img:"torresmo.jpg"}
],
Doces:[
{name:"Pudim",price:6,descricao:"Caseiro",img:"pudim.jpg"},
{name:"Doce de leite",price:5,descricao:"Mineiro",img:"doce.jpg"},
{name:"Paçoca",price:3,descricao:"Tradicional",img:"pacoca.jpg"},
{name:"Canjica",price:6,descricao:"Doce",img:"canjica.jpg"},
{name:"Arroz doce",price:5,descricao:"Cremoso",img:"arrozdoce.jpg"},
{name:"Bolo",price:7,descricao:"Fatia",img:"bolo.jpg"},
{name:"Cocada",price:4,descricao:"Coco",img:"cocada.jpg"},
{name:"Romeu e Julieta",price:6,descricao:"Queijo e goiabada",img:"romeujulieta.jpg"}
]
};

function renderHome(){
let html=avisoPix()+"<h3>Categorias</h3>";
for(let cat in produtos){html+=`<div class="card" onclick="navigate(()=>openCat('${cat}'))"><b>${cat}</b></div>`;}
document.getElementById("app").innerHTML=html;
}

function openCat(cat){
let html=avisoPix()+`<button onclick="history.back()">⬅ Voltar</button><h3>${cat}</h3>`;
if(cat=="Marmitas"){html+=`<div class="aviso">Tamanhos: P R$15 | M R$18 | G R$22</div>`;}
produtos[cat].forEach((p,i)=>{
html+=`<div class="card"><div class="flex"><div class="flex"><div class="circle"><img src="${p.img}"></div><div><b>${p.name}</b><br>${p.descricao}<br>R$ ${p.price.toFixed(2)}</div></div><button class="primary small" onclick="add('${cat}',${i})">Adicionar</button></div></div>`;
});
document.getElementById("app").innerHTML=html;
}

function add(cat,i){let item=produtos[cat][i];let f=cart.find(x=>x.name==item.name);if(f){f.qty++}else{cart.push({...item,qty:1})}updateCart();toast();}
function removeFromCart(index){cart.splice(index,1);updateCart();renderCart();}
function updateCart(){document.getElementById("cartCount").innerText=cart.reduce((s,i)=>s+i.qty,0);} 
function toast(){let t=document.getElementById("toast");t.style.display="block";setTimeout(()=>t.style.display="none",1500);} 
function goCart(){navigate(renderCart);} 

function renderCart(){
let html=avisoPix()+"<button onclick='history.back()'>⬅ Voltar</button><h3>Carrinho</h3>";
let subtotal=0;
cart.forEach((i,index)=>{subtotal+=i.price*i.qty;html+=`<div class="card flex"><div>${i.qty}x ${i.name}</div><div>R$ ${(i.price*i.qty).toFixed(2)}</div><button onclick="removeFromCart(${index})">❌</button></div>`;});
html+=`<h4>Subtotal: R$ ${subtotal.toFixed(2)}</h4><button class="primary" onclick="navigate(renderCheckout)">Continuar</button>`;
document.getElementById("app").innerHTML=html;
}

function renderCheckout(){
let html=avisoPix()+`<button onclick="history.back()">⬅ Voltar</button><h3>Dados do Pedido</h3>
<input id="nome" placeholder="Seu nome" required>
<input id="fone" placeholder="Telefone" required>
<label>Tipo:</label>
<select id="tipo" onchange="toggleEndereco()">
<option value="Entrega">Entrega (+7)</option>
<option value="Retirada">Retirada</option>
</select>
<div id="enderecoBox"><input id="endereco" placeholder="Endereço de entrega"></div>
<label>Quando?</label>
<select id="quando" onchange="toggleData()">
<option value="Agora">Agora</option>
<option value="Agendar">Agendar</option>
</select>
<div id="dataBox" class="hidden"><input type="datetime-local" id="data"></div>
<label>Pagamento:</label>
<select id="pag" onchange="toggleTroco()">
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão</option>
</select>
<div id="trocoBox" class="hidden"><input id="troco" placeholder="Troco para quanto?"></div>
<button class="primary" onclick="revisao()">Revisar Pedido</button>`;
document.getElementById("app").innerHTML=html;
}

function toggleData(){document.getElementById("dataBox").classList.toggle("hidden",document.getElementById("quando").value!="Agendar");}
function toggleEndereco(){document.getElementById("enderecoBox").classList.toggle("hidden",document.getElementById("tipo").value!="Entrega");}
function toggleTroco(){document.getElementById("trocoBox").classList.toggle("hidden",document.getElementById("pag").value!="Dinheiro");}

function revisao(){
dadosPedido={
nome:document.getElementById("nome").value,
fone:document.getElementById("fone").value,
tipo:document.getElementById("tipo").value,
endereco:document.getElementById("endereco").value,
pag:document.getElementById("pag").value,
troco:document.getElementById("troco").value,
quando:document.getElementById("quando").value,
data:document.getElementById("data").value
};
navigate(renderRevisao);
}

function renderRevisao(){
let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=dadosPedido.tipo=="Entrega"?subtotal+TAXA:subtotal;
let html=avisoPix()+"<button onclick='history.back()'>⬅ Voltar</button><h3>Confirmar Pedido</h3>";
html+=`<b>Cliente:</b> ${dadosPedido.nome}<br>`;
html+=`<b>Telefone:</b> ${dadosPedido.fone}<br>`;
html+=`<b>Tipo:</b> ${dadosPedido.tipo}<br>`;
if(dadosPedido.tipo=="Entrega"){html+=`<b>Endereço:</b> ${dadosPedido.endereco}<br>`;}
if(dadosPedido.quando=="Agendar"){html+=`<b>Agendado para:</b> ${dadosPedido.data}<br>`;}
html+="<hr>";
cart.forEach(i=>{html+=`<div>${i.qty}x ${i.name}</div>`;});
html+=`<hr>Subtotal: R$ ${subtotal.toFixed(2)}<br>Total: R$ ${total.toFixed(2)}<br>Pagamento: ${dadosPedido.pag}<br><button class="primary" onclick="finalizar()">Confirmar e Enviar</button>`;
document.getElementById("app").innerHTML=html;
}

function finalizar(){
let subtotal=cart.reduce((s,i)=>s+i.price*i.qty,0);
let total=dadosPedido.tipo=="Entrega"?subtotal+TAXA:subtotal;
let msg="*Pedido - NOGUEIRA RESTAURANTE DA ROÇA*%0A%0A";
msg+=`👤 Nome: ${dadosPedido.nome}%0A`;
msg+=`📞 Telefone: ${dadosPedido.fone}%0A`;
msg+=`📦 Tipo: ${dadosPedido.tipo}%0A`;
if(dadosPedido.tipo=="Entrega"){msg+=`🏠 Endereço: ${dadosPedido.endereco}%0A`;}
if(dadosPedido.quando=="Agendar"){msg+=`⏰ Agendado para: ${dadosPedido.data}%0A`;}
msg+="%0A🛒 Itens:%0A";
cart.forEach(i=>{msg+=`${i.qty}x ${i.name}%0A`;});
msg+=`%0A💰 Total: R$${total.toFixed(2)}%0A`;
msg+=`💳 Pagamento: ${dadosPedido.pag}%0A`;
if(dadosPedido.pag=="Dinheiro" && dadosPedido.troco){msg+=`💵 Troco para: ${dadosPedido.troco}%0A`;}
window.open(`https://wa.me/5511952282056?text=${msg}`);
}

navigate(renderHome);
</script></body>
</html>
